version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    groups:
      tauri:
        patterns:
          - "tauri"
          - "tauri-build"
  - package-ecosystem: npm
    directory: "/app/"
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    groups:
      unocss:
        patterns:
          - "@unocss/*"
          - "unocss"
      tauri:
        patterns:
          - "@tauri-apps/*"
