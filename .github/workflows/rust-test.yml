name: Rust checks

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**/*.md"

jobs:
  checks:
    name: "Rust ${{ matrix.rust }}"
    # Skip Dependabot's automated dep-bump PRs. They can't merge without
    # maintainer approval anyway; run CI when the human promotes them.
    if: github.actor != 'dependabot[bot]'
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        # Test stable + MSRV. MSRV mirrors the workspace Cargo.toml's
        # rust-version field.
        rust: [stable, "1.94"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: clippy rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --all --check

      - name: cargo check
        run: cargo check --workspace --all-targets --locked

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: cargo test
        run: cargo test --workspace --all-targets --locked
